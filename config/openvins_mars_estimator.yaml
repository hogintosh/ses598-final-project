%YAML:1.0

verbosity: "INFO"

use_fej: true
integration: "rk4"
use_stereo: false
max_cameras: 1

calib_cam_extrinsics: false
calib_cam_intrinsics: false
calib_cam_timeoffset: false
calib_imu_intrinsics: false
calib_imu_g_sensitivity: false

max_clones: 11
max_slam: 40
max_slam_in_update: 20
max_msckf_in_update: 40
dt_slam_delay: 1.0

gravity_mag: 9.80665

feat_rep_msckf: "GLOBAL_3D"
feat_rep_slam: "ANCHORED_INVERSE_DEPTH_SINGLE"
feat_rep_aruco: "ANCHORED_MSCKF_INVERSE_DEPTH"

try_zupt: false
zupt_chi2_multipler: 0
zupt_max_velocity: 0.1
zupt_noise_multiplier: 10
zupt_max_disparity: 0.5
zupt_only_at_beginning: false

init_window_time: 2.0
init_imu_thresh: 0.0
init_max_disparity: 0.01
init_max_features: 80

init_dyn_use: true
init_dyn_mle_opt_calib: false
init_dyn_mle_max_iter: 50
init_dyn_mle_max_time: 0.20
init_dyn_mle_max_threads: 6
init_dyn_num_pose: 6
init_dyn_min_deg: 0.5
init_dyn_inflation_ori: 10
init_dyn_inflation_vel: 100
init_dyn_inflation_bg: 10
init_dyn_inflation_ba: 100
init_dyn_min_rec_cond: 1e-12
init_dyn_bias_g: [0.0, 0.0, 0.0]
init_dyn_bias_a: [0.0, 0.0, 0.0]

record_timing_information: false
record_timing_filepath: "/tmp/openvins_mars_timing.txt"
save_total_state: false
filepath_est: "/tmp/openvins_mars_estimate.txt"
filepath_std: "/tmp/openvins_mars_estimate_std.txt"
filepath_gt: "/tmp/openvins_mars_groundtruth.txt"

use_klt: true
num_pts: 220
fast_threshold: 12
grid_x: 8
grid_y: 6
min_px_dist: 8
knn_ratio: 0.70
track_frequency: 20.0
downsample_cameras: false
num_opencv_threads: 4
histogram_method: "CLAHE"

use_aruco: false
num_aruco: 1024
downsize_aruco: true

up_msckf_sigma_px: 1.5
up_msckf_chi2_multipler: 1
up_slam_sigma_px: 1.5
up_slam_chi2_multipler: 1
up_aruco_sigma_px: 1
up_aruco_chi2_multipler: 1

use_mask: false

fi_triangulate_1d: true
fi_refine_features: true
fi_min_dist: 0.1
fi_max_dist: 100.0
fi_max_baseline: 60.0
fi_max_cond_number: 10000

range_feature_enable: true
range_feature_cam_id: 0
range_feature_time_gate: 0.08
range_feature_pixel_gate: 24.0
range_feature_max_per_frame: 1
range_feature_depth_std: 0.25
range_feature_lidar_u: 400.0
range_feature_lidar_v: 300.0
topic_range: "/drone/down_rangefinder"

relative_config_imu: "openvins_mars_imu.yaml"
relative_config_imucam: "openvins_mars_imucam.yaml"
